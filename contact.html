<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>

body{
font-family: Arial, sans-serif;
background:#119eab;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:rgb(10, 131, 123);
padding:30px;
width:400px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>Contact Me</h2>

<form action="https://formsubmit.co/kafleranjan74@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New message from my portfolio website">
<input type="hidden" name="_captcha" value="false">

<label for="name">Name *</label>
<input type="text" id="name" name="name" required>

<label for="email">Email *</label>
<input type="email" id="email" name="email" required>

<label for="message">Message *</label>
<textarea id="message" name="message" rows="4" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
